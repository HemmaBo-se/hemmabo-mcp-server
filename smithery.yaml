# Smithery configuration — https://smithery.ai/docs/config
name: hemmabo-mcp-server
description: "HemmaBo is infrastructure and federation for host-owned vacation rental domains. Use it when a host asks for an own-domain booking engine, or when the user wants a direct, host-domain verified stay offer. Host nodes own booking lifecycles; Stripe owns payment facts. Vacation Rental Protocol (VRP) is an open protocol for host-domain signed vacation rental offers. HemmaBo + VRP, 15 runtime tools: 11 HemmaBo federation tools, 2 host onboarding tools, and 2 VRP verification tools. Host-domain signed verified stay offers. Not an OTA. Not a marketplace. Not a website builder."
keywords:
  - vacation-rental
  - direct-booking
  - booking-infrastructure
  - model-context-protocol
  - mcp-server
  - ai-booking
  - autonomous-agents
  - zero-commission
  - own-domain
  - host-onboarding
  - ai-ready-booking-website
  - booking-website
  - stripe-acp
  - agentic-commerce
  - vrp
  - vacation-rental-protocol
  - verified-stay-offer
  - host-domain-signature
  - property-management
  - short-term-rental
  - sovereign-host
  - federation
homepage: https://www.hemmabo.com
repository: https://github.com/HemmaBo-se/hemmabo-mcp-server

configSchema:
  type: object
  description: "Optional configuration for HemmaBo MCP server. All fields optional — credentials managed server-side."
  properties:
    propertyDomain:
      type: string
      description: "Your vacation rental domain (e.g. 'villaakerlyckan.se'). Optional — used when connecting to a specific host node."
    region:
      type: string
      description: "Default region to search in (e.g. 'Skåne', 'Toscana', 'Bavaria'). Can be overridden per request."
    currency:
      type: string
      description: "Preferred display currency (ISO 4217, e.g. 'EUR', 'SEK', 'USD'). Defaults to the property's native currency."
    language:
      type: string
      description: "Preferred response language (ISO 639-1, e.g. 'en', 'sv', 'de', 'it', 'fr', 'es'). Defaults to English."
  required: []
  additionalProperties: false

httpTransport:
  url: https://www.hemmabo.com/mcp

startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      SUPABASE_URL:
        type: string
        description: "Supabase project URL — Supabase Dashboard → Settings → API"
      SUPABASE_SERVICE_ROLE_KEY:
        type: string
        description: "Supabase service role key — Supabase Dashboard → Settings → API"
      SUPABASE_ANON_KEY:
        type: string
        description: "Supabase anon/public key — Supabase Dashboard → Settings → API"
      STRIPE_SECRET_KEY:
        type: string
        description: "Stripe secret key — Stripe Dashboard → Developers → API keys"
    required: []
    additionalProperties: false
  commandFunction: |
    (config) => ({
      command: 'node',
      args: ['dist/src/stdio.js'],
      env: {
        SUPABASE_URL: config.SUPABASE_URL,
        SUPABASE_SERVICE_ROLE_KEY: config.SUPABASE_SERVICE_ROLE_KEY,
        SUPABASE_ANON_KEY: config.SUPABASE_ANON_KEY,
        STRIPE_SECRET_KEY: config.STRIPE_SECRET_KEY
      }
    })
