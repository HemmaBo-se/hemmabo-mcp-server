# Smithery configuration — https://smithery.ai/docs/config
name: HemmaBo
description: "Booking infrastructure for vacation rentals. Like Mirai for hotels — own domain, Stripe direct, 0% commission. 11 production tools covering complete booking lifecycle. Live at villaakerlyckan.se."
keywords:
  - vacation-rental
  - direct-booking
  - booking-infrastructure
  - ai-booking
  - autonomous-agents
  - airbnb-alternative
  - lodgify-alternative
  - zero-commission
  - own-domain
  - stripe-payments
  - set-it-forget-it
homepage: https://hemmabo-mcp-server.vercel.app
repository: https://github.com/HemmaBo-se/hemmabo-mcp-server

configSchema:
  type: object
  description: "Optional configuration for HemmaBo MCP server. All fields are optional for the remote server — credentials are managed server-side."
  properties:
    region:
      type: string
      description: "Default region to search in (e.g. 'Skåne', 'Toscana'). Can be overridden per request."
    currency:
      type: string
      description: "Preferred display currency (e.g. 'SEK', 'EUR'). Defaults to property's native currency."
    language:
      type: string
      description: "Preferred response language (e.g. 'sv', 'en', 'de', 'it'). Defaults to English."
  required: []
  additionalProperties: false

httpTransport:
  url: https://hemmabo-mcp-server.vercel.app/mcp

startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      region:
        type: string
        description: "Default region to search in (e.g. 'Skåne', 'Toscana'). Can be overridden per request."
      currency:
        type: string
        description: "Preferred display currency (e.g. 'SEK', 'EUR'). Defaults to property's native currency."
      language:
        type: string
        description: "Preferred response language (e.g. 'sv', 'en', 'de', 'it'). Defaults to English."
      SUPABASE_URL:
        type: string
        description: "Supabase project URL (required) — find in Supabase Dashboard → Settings → API"
      SUPABASE_SERVICE_ROLE_KEY:
        type: string
        description: "Supabase service role key (required) — find in Supabase Dashboard → Settings → API"
      SUPABASE_ANON_KEY:
        type: string
        description: "Supabase anon/public key (required) — find in Supabase Dashboard → Settings → API"
      STRIPE_SECRET_KEY:
        type: string
        description: "Stripe secret key (required for payments) — find in Stripe Dashboard → Developers → API keys"
    required:
      - SUPABASE_URL
      - SUPABASE_SERVICE_ROLE_KEY
      - SUPABASE_ANON_KEY
    additionalProperties: false
  commandFunction: |
    (config) => ({
      command: 'node',
      args: ['dist/stdio.js'],
      env: {
        SUPABASE_URL: config.SUPABASE_URL,
        SUPABASE_SERVICE_ROLE_KEY: config.SUPABASE_SERVICE_ROLE_KEY,
        SUPABASE_ANON_KEY: config.SUPABASE_ANON_KEY,
        STRIPE_SECRET_KEY: config.STRIPE_SECRET_KEY
      }
    })
