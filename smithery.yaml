# Smithery configuration — https://smithery.ai/docs/config
name: hemmabo-mcp-server
description: "Vacation rental booking infrastructure for independent hosts. Own domain, Stripe direct payments, 0% commission. Each host is a sovereign booking node — own Supabase database, own Stripe account, never routed through a marketplace. AI-native: built on Model Context Protocol + Stripe ACP. Search properties, check live availability, get pricing quotes, and complete bookings. 11 tools. Not an OTA. Not a marketplace. Infrastructure. Live: villaakerlyckan.se. From $39/month."
keywords:
  - vacation-rental
  - direct-booking
  - booking-infrastructure
  - model-context-protocol
  - mcp-server
  - ai-booking
  - autonomous-agents
  - airbnb-alternative
  - lodgify-alternative
  - zero-commission
  - own-domain
  - stripe-acp
  - agentic-commerce
  - property-management
  - short-term-rental
  - sovereign-host
  - federation
homepage: https://hemmabo.com
repository: https://github.com/HemmaBo-se/hemmabo-mcp-server

configSchema:
  type: object
  description: "Optional configuration for HemmaBo MCP server. All fields optional — credentials managed server-side."
  properties:
    propertyDomain:
      type: string
      description: "Your vacation rental domain (e.g. 'villaakerlyckan.se'). Optional — used when connecting to a specific host node."
    region:
      type: string
      description: "Default region to search in (e.g. 'Skåne', 'Toscana', 'Bavaria'). Can be overridden per request."
    currency:
      type: string
      description: "Preferred display currency (ISO 4217, e.g. 'EUR', 'SEK', 'USD'). Defaults to the property's native currency."
    language:
      type: string
      description: "Preferred response language (ISO 639-1, e.g. 'en', 'sv', 'de', 'it', 'fr', 'es'). Defaults to English."
  required: []
  additionalProperties: false

httpTransport:
  url: https://hemmabo-mcp-server.vercel.app/mcp

startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      SUPABASE_URL:
        type: string
        description: "Supabase project URL — Supabase Dashboard → Settings → API"
      SUPABASE_SERVICE_ROLE_KEY:
        type: string
        description: "Supabase service role key — Supabase Dashboard → Settings → API"
      SUPABASE_ANON_KEY:
        type: string
        description: "Supabase anon/public key — Supabase Dashboard → Settings → API"
      STRIPE_SECRET_KEY:
        type: string
        description: "Stripe secret key — Stripe Dashboard → Developers → API keys"
    required: []
    additionalProperties: false
  commandFunction: |
    (config) => ({
      command: 'node',
      args: ['dist/stdio.js'],
      env: {
        SUPABASE_URL: config.SUPABASE_URL,
        SUPABASE_SERVICE_ROLE_KEY: config.SUPABASE_SERVICE_ROLE_KEY,
        SUPABASE_ANON_KEY: config.SUPABASE_ANON_KEY,
        STRIPE_SECRET_KEY: config.STRIPE_SECRET_KEY
      }
    })
