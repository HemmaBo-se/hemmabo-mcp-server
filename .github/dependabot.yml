version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: deps
      include: scope
    ignore:
      # @supabase/supabase-js >= 2.105.2 removes `ws` from realtime-js, which
      # breaks Vercel's Node 20 runtime (no native WebSocket). Pin to 2.105.1
      # until we either upgrade to Node 22 or wire `ws` into createClient.
      - dependency-name: "@supabase/supabase-js"
        versions: [">=2.105.2"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
      include: scope
